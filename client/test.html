<!DOCTYPE html>
<html>
<head>
<style>
/* Paste the loader CSS here */
body { background: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }

.loader {
  --duration: 3s;
  position: relative;
  width: 120px;
  height: 120px;
  perspective: 600px;
  transform-style: preserve-3d;
  margin: auto;
}
.box {
  position: absolute;
  width: 32px;
  height: 32px;
  top: 50%;
  left: 50%;
  margin-top: -16px;
  margin-left: -16px;
  transform-style: preserve-3d;
}
.box > div {
  width: 100%;
  height: 100%;
  background-color: #3b82f6;
  position: absolute;
  transform-style: preserve-3d;
  transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(0);
  animation: var(--duration) linear infinite;
}
.box > div::before, .box > div::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background-color: #3b82f6;
}
.box > div::before {
  transform-origin: left;
  transform: rotateY(90deg);
  filter: brightness(0.8);
}
.box > div::after {
  transform-origin: top;
  transform: rotateX(90deg);
  filter: brightness(0.6);
}
.box0 { --x: -32px; --y: -32px; animation: box-move0 var(--duration) linear infinite; }
.box1 { --x: 0px;   --y: -32px; animation: box-move1 var(--duration) linear infinite; }
.box2 { --x: 32px;  --y: -32px; animation: box-move2 var(--duration) linear infinite; }
.box3 { --x: -32px; --y: 0px;   animation: box-move3 var(--duration) linear infinite; }
.box4 { --x: 32px;  --y: 0px;   animation: box-move4 var(--duration) linear infinite; }
.box5 { --x: -32px; --y: 32px;  animation: box-move5 var(--duration) linear infinite; }
.box6 { --x: 0px;   --y: 32px;  animation: box-move6 var(--duration) linear infinite; }
.box7 { --x: 32px;  --y: 32px;  animation: box-move7 var(--duration) linear infinite; }

.box0 > div { animation-name: box-scale0; }
.box1 > div { animation-name: box-scale1; }
.box2 > div { animation-name: box-scale2; }
.box3 > div { animation-name: box-scale3; }
.box4 > div { animation-name: box-scale4; }
.box5 > div { animation-name: box-scale5; }
.box6 > div { animation-name: box-scale6; }
.box7 > div { animation-name: box-scale7; }

.ground {
  position: absolute;
  width: 120px;
  height: 120px;
  bottom: -40px;
  left: 0px;
  background: rgba(255, 255, 255, 0.05);
  transform: rotateX(90deg) rotateY(0deg) translateZ(-40px);
  animation: ground var(--duration) linear infinite;
}
.ground > div {
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(59,130,246,0.4) 0%, rgba(59,130,246,0) 60%);
  animation: ground-shine var(--duration) linear infinite;
}
@keyframes box-move0 { 0%, 12% { transform: translate(var(--x), var(--y)); } 25%, 52% { transform: translate(0, 0); } 80% { transform: translate(0, -32px); } 90%, 100% { transform: translate(0, 188px); } }
@keyframes box-scale0 { 0%, 6% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(0); } 14%, 100% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(1); } }
@keyframes box-move1 { 0%, 16% { transform: translate(var(--x), var(--y)); } 29%, 52% { transform: translate(0, 0); } 80% { transform: translate(0, -32px); } 90%, 100% { transform: translate(0, 188px); } }
@keyframes box-scale1 { 0%, 10% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(0); } 18%, 100% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(1); } }
@keyframes box-move2 { 0%, 20% { transform: translate(var(--x), var(--y)); } 33%, 52% { transform: translate(0, 0); } 80% { transform: translate(0, -32px); } 90%, 100% { transform: translate(0, 188px); } }
@keyframes box-scale2 { 0%, 14% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(0); } 22%, 100% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(1); } }
@keyframes box-move3 { 0%, 24% { transform: translate(var(--x), var(--y)); } 37%, 52% { transform: translate(0, 0); } 80% { transform: translate(0, -32px); } 90%, 100% { transform: translate(0, 188px); } }
@keyframes box-scale3 { 0%, 18% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(0); } 26%, 100% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(1); } }
@keyframes box-move4 { 0%, 28% { transform: translate(var(--x), var(--y)); } 41%, 52% { transform: translate(0, 0); } 80% { transform: translate(0, -32px); } 90%, 100% { transform: translate(0, 188px); } }
@keyframes box-scale4 { 0%, 22% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(0); } 30%, 100% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(1); } }
@keyframes box-move5 { 0%, 32% { transform: translate(var(--x), var(--y)); } 45%, 52% { transform: translate(0, 0); } 80% { transform: translate(0, -32px); } 90%, 100% { transform: translate(0, 188px); } }
@keyframes box-scale5 { 0%, 26% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(0); } 34%, 100% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(1); } }
@keyframes box-move6 { 0%, 36% { transform: translate(var(--x), var(--y)); } 49%, 52% { transform: translate(0, 0); } 80% { transform: translate(0, -32px); } 90%, 100% { transform: translate(0, 188px); } }
@keyframes box-scale6 { 0%, 30% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(0); } 38%, 100% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(1); } }
@keyframes box-move7 { 0%, 40% { transform: translate(var(--x), var(--y)); } 53%, 52% { transform: translate(0, 0); } 80% { transform: translate(0, -32px); } 90%, 100% { transform: translate(0, 188px); } }
@keyframes box-scale7 { 0%, 34% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(0); } 42%, 100% { transform: rotateY(-47deg) rotateX(-15deg) rotateZ(15deg) scale(1); } }
</style>
</head>
<body>
    <div class="loader">
      <div class="box box0"><div></div></div>
      <div class="box box1"><div></div></div>
      <div class="box box2"><div></div></div>
      <div class="box box3"><div></div></div>
      <div class="box box4"><div></div></div>
      <div class="box box5"><div></div></div>
      <div class="box box6"><div></div></div>
      <div class="box box7"><div></div></div>
      <div class="ground"><div></div></div>
    </div>
</body>
</html>
